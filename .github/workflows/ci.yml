name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Use the interpreter from actions/setup-python instead of letting uv download
  # a managed CPython. setup-python's prerelease support is what makes the 3.15
  # (alpha) job installable; UV_PYTHON_PREFERENCE keeps uv on that interpreter.
  UV_PYTHON_PREFERENCE: only-system

jobs:
  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          # Pin the exact uv so the lockfile it produces matches the committed
          # one byte-for-byte (keep in sync with [tool.uv] required-version).
          version: "0.11.17"
          enable-cache: true

      # --locked fails the build if uv.lock is out of sync with pyproject.toml,
      # so a dependency change that skipped `uv lock` can't merge silently.
      - name: Install dev dependencies
        run: uv sync --locked --extra dev

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format
        run: uv run ruff format --check src tests

      - name: mypy
        run: uv run mypy

  test:
    name: test (py${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # 3.15 is a prerelease — let it run for early warning without failing the build.
    continue-on-error: ${{ matrix.python-version == '3.15' }}
    strategy:
      fail-fast: false
      matrix:
        # Full version sweep on Linux (fast, and pywin32 is skipped there).
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14', '3.15']
        # Plus Windows on the versions where pywin32 has wheels, to confirm the
        # package installs + imports on the platform users actually run.
        include:
          - os: windows-latest
            python-version: '3.10'
          - os: windows-latest
            python-version: '3.11'
          - os: windows-latest
            python-version: '3.12'
          - os: windows-latest
            python-version: '3.13'
          - os: windows-latest
            python-version: '3.14'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.17"
          enable-cache: true

      - name: Install (with dev extras)
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --no-sync pytest -q
