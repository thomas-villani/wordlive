# Keep the pinned GitHub Actions current. The CI / docs / release workflows pin
# actions to exact majors (e.g. astral-sh/setup-uv@v8.1.0, actions/checkout@v6);
# without this they go stale silently. Updates are grouped into a single weekly
# PR to keep the noise down.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns:
          - "*"
