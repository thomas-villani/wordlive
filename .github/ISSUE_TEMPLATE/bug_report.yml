name: Bug report
description: Something in wordlive misbehaves against a running Word instance.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! wordlive bugs are often version- and
        surface-specific — the environment fields below are usually the deciding
        clue for a COM issue, so please fill them in.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: |
        Steps to reproduce:
        1. ...
        2. ...

        Expected: ...
        Actual: ...
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      description: How were you driving wordlive?
      options:
        - Python API (import wordlive as wl)
        - CLI (wordlive ...)
        - MCP server (wordlive-mcp)
        - exec batch (wordlive exec / word_exec)
    validations:
      required: true
  - type: input
    id: wordlive-version
    attributes:
      label: wordlive version
      description: "`wordlive --version`, or `pip show wordlive` / `uv pip show wordlive`."
      placeholder: "0.12.0"
    validations:
      required: true
  - type: input
    id: word-version
    attributes:
      label: Microsoft Word version
      placeholder: "Microsoft 365 / Word 2021 / 2019 / 2016 / 2013 / 2010"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.13.1"
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: Windows version
      placeholder: "Windows 11 23H2"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output / traceback
      description: >-
        The full traceback, or the JSON error payload from the CLI / MCP
        (`code`, message, exit code). Pasted text is rendered as code — no
        backticks needed.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I'm on Windows with Microsoft Word installed and running.
          required: true
        - label: I've reproduced this on the latest released version of wordlive.
          required: false
